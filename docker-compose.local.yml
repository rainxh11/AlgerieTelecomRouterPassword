name: fiberhome-password

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fiberhome-frontend
    expose:
      - "8000"
    ports:
      - "3000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
